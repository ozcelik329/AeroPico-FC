name: AeroPico CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      hil_port:
        description: "Optional serial port for manual HIL smoke, e.g. /dev/ttyACM0"
        required: false
        default: ""

env:
  PLATFORMIO_CORE_DIR: ~/.platformio

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install -U platformio
      - name: Build Pico firmware
        run: pio run -e pico

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install -U platformio
      - name: Run native unit tests
        run: pio test -e native --without-uploading
      - name: Run native full-link integration
        run: pio test -e native_link --without-uploading

  fault-injection:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install -U platformio
      - name: Run fault-injection smoke
        run: python3 tools/fault_injection/fault_injection.py --json-report fault_matrix_report.json
      - name: Upload fault matrix report
        uses: actions/upload-artifact@v4
        with:
          name: fault-matrix-report
          path: fault_matrix_report.json

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install -U platformio
      - name: Run static analysis
        run: pio check -e pico --skip-packages --fail-on-defect=high --silent
      - name: Enforce architecture policies
        run: python3 tools/ci/check_architecture.py

  software-smoke:
    runs-on: ubuntu-latest
    needs: [build-firmware, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install -U platformio
      - name: Run software smoke tests
        run: |
          pio test -e native --without-uploading --filter test_sensor_pipeline
          pio test -e native --without-uploading --filter test_mavlink_override
          pio test -e native --without-uploading --filter test_state_publisher
          pio test -e native --without-uploading --filter test_blackboard
          pio test -e native --without-uploading --filter test_event_bus
          pio test -e native --without-uploading --filter test_blackbox
          pio test -e native_link --without-uploading

  configurator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/aeropico-configurator/package-lock.json
      - name: Install configurator dependencies
        working-directory: tools/aeropico-configurator
        run: npm ci
      - name: Check configurator JavaScript
        working-directory: tools/aeropico-configurator
        run: npm run check

  hil-smoke:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.hil_port != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install HIL dependencies
        run: python -m pip install pyserial
      - name: Run manual HIL smoke
        run: python3 tools/hil_smoke/hil_smoke.py --port "${{ inputs.hil_port }}"
