[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower

build_flags = 
    -O2
    -fno-fast-math
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_RTTI
    -D__FREERTOS=1
    -DFREERTOS_ENABLED
    -DMAVLINK_DIALECT=common
    -I.pio/libdeps/pico/c_library_v2
    -I.pio/libdeps/pico/c_library_v2/common
    -Wno-address-of-packed-member
    -DMAVLINK_PARAMS_ENABLED
    -DconfigCHECK_FOR_STACK_OVERFLOW=2
    -DconfigUSE_MALLOC_FAILED_HOOK=1
lib_deps =
    bolderflight/Bolder Flight Systems SBUS @ ^8.1.4
    https://github.com/mavlink/c_library_v2.git
build_src_filter =
    +<*>
    -<smoke_usb.cpp>
check_src_filters =
    +<src/>
check_flags =
    cppcheck: --suppress=uninitvar:*mavlink_msg_auth_key.h

[env:pico_bench]
extends = env:pico
build_flags =
    ${env:pico.build_flags}
    -DAEROPICO_BENCH_MODE=1
    -DWATCHDOG_HARDWARE_ENABLED=0
    -DESP32_CAM_LINK_ENABLED=0
    -DBATTERY_ADC_ENABLED=0
    -DMAVLINK_USB_ENABLED=1

[env:pico_usb_smoke]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
build_flags =
    -O2
    -fno-fast-math
build_src_filter =
    -<*>
    +<smoke_usb.cpp>


[platformio]
src_dir = src
test_dir = test

[env:native]
platform = native
test_framework = unity
build_flags =
    -DUNIT_TEST
    -DMAVLINK_PARAMS_ENABLED
    -I test/native_include
    -I src
    -I .pio/libdeps/native/c_library_v2
    -I .pio/libdeps/native/c_library_v2/common
lib_deps =
    https://github.com/mavlink/c_library_v2.git
test_build_src = false
test_ignore =
    test_native_full_link

[env:native_link]
platform = native
test_framework = unity
build_flags =
    -DUNIT_TEST
    -DMAVLINK_PARAMS_ENABLED
    -I test/native_include
    -I src
lib_deps =
test_build_src = true
build_src_filter =
    -<*>
    +<native_link_main.cpp>
    +<core/safety/BatteryMonitor.cpp>
    +<estimators/BaroVerticalKalman.cpp>
test_filter = test_native_full_link
